---
layout: default
---
<article class="memo">
  <h1 class="memo-title">{{ page.title }}</h1>
  <div class="memo-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.doc_type %} &middot; {{ page.doc_type }}{% endif %}</div>
  <div class="memo-rule"></div>

  {% if page.abstract %}
  <p class="memo-abstract">{{ page.abstract }}</p>
  <div class="memo-rule"></div>
  {% endif %}

  <div class="memo-body">
    {{ content }}
  </div>
</article>
