---
layout: default
---
<article class="memo">
  <h1 class="memo-title">{{ page.title }}</h1>
  <div class="memo-meta">{{ page.organization }}{% if page.period %} &middot; {{ page.period }}{% endif %}</div>
  <div class="memo-rule"></div>

  {% if page.tech %}
  <div class="memo-tags">{{ page.tech | join: " &middot; " }}</div>
  {% endif %}

  <div class="memo-body">
    {{ content }}
  </div>
</article>
