---
layout: default
---
<article class="project">
  <header class="project-header">
    <h1>{{ page.title }}</h1>
    {% if page.tech %}
    <div class="tech-stack">
      {% for t in page.tech %}
      <span class="tech-badge">{{ t }}</span>
      {% endfor %}
    </div>
    {% endif %}
    {% if page.link %}
    <a href="{{ page.link }}" class="project-link" target="_blank">View Project &rarr;</a>
    {% endif %}
  </header>
  <div class="project-content">
    {{ content }}
  </div>
</article>
