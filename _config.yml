title: Workshopping
description: Archive made by Cecil O. Franklin
url: "https://ceciloFranklin.github.io"
baseurl: ""

markdown: kramdown
permalink: /memoranda/:slug/

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

collections:
  experiences:
    output: true
    permalink: /experience/:title/

# Document numbering prefix
doc_prefix: "CF"

# Research programs
programs:
  SMM:
    name: "Space-Made Materials"
    question: "What materials can only be made in space and what do they enable?"
  ISR:
    name: "Industrial Stack Reconstruction"
    question: "How do we rebuild the industrial stack on the Moon/Mars?"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "memo"
  - scope:
      path: ""
      type: "experiences"
    values:
      layout: "experience"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
