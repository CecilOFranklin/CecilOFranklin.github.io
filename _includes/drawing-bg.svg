<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="none" width="100%" height="100%" class="drawing-svg">
  <defs>
    <pattern id="fineGrid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" class="grid-line-fine" stroke-width="0.3"/>
    </pattern>
    <pattern id="majorGrid" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="url(#fineGrid)"/>
      <path d="M 100 0 L 0 0 0 100" fill="none" class="grid-line-major" stroke-width="0.4"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#majorGrid)"/>
</svg>
