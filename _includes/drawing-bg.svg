<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" class="drawing-svg">
  <defs>
    <style>
      .dg-line { stroke: rgba(80,90,100,0.07); fill: none; }
      .dg-line-heavy { stroke: rgba(80,90,100,0.10); fill: none; stroke-width: 2; }
      .dg-line-medium { stroke: rgba(80,90,100,0.08); fill: none; stroke-width: 1; }
      .dg-line-thin { stroke: rgba(80,90,100,0.05); fill: none; stroke-width: 0.5; }
      .dg-text { fill: rgba(80,90,100,0.09); font-family: 'Courier Prime', 'Courier New', monospace; }
      .dg-ghost { stroke: rgba(80,90,100,0.035); fill: none; }
      .dg-ghost-fill { fill: rgba(80,90,100,0.02); stroke: none; }
    </style>

    <!-- Fine grid -->
    <pattern id="fineGrid" width="18" height="18" patternUnits="userSpaceOnUse">
      <path d="M 18 0 L 0 0 0 18" class="dg-line-thin"/>
    </pattern>
    <!-- Major grid -->
    <pattern id="majorGrid" width="90" height="90" patternUnits="userSpaceOnUse">
      <rect width="90" height="90" fill="url(#fineGrid)"/>
      <path d="M 90 0 L 0 0 0 90" class="dg-line" stroke-width="0.75"/>
    </pattern>
  </defs>

  <!-- Full grid fill -->
  <rect width="100%" height="100%" fill="url(#majorGrid)"/>

  <!-- === BORDER SYSTEM === -->
  <!-- Outer border (trim line) -->
  <rect x="8" y="8" width="calc(100% - 16px)" height="calc(100% - 16px)" class="dg-line-heavy"/>
  <!-- Inner border (drawing area) -->
  <rect x="20" y="20" width="calc(100% - 40px)" height="calc(100% - 40px)" class="dg-line-medium"/>

  <!-- === ZONE MARKERS (top edge, letters) === -->
  <!-- Tick marks at zone boundaries along top -->
  <line x1="16.6%" y1="8" x2="16.6%" y2="20" class="dg-line" stroke-width="0.75"/>
  <line x1="33.3%" y1="8" x2="33.3%" y2="20" class="dg-line" stroke-width="0.75"/>
  <line x1="50%" y1="8" x2="50%" y2="20" class="dg-line" stroke-width="0.75"/>
  <line x1="66.6%" y1="8" x2="66.6%" y2="20" class="dg-line" stroke-width="0.75"/>
  <line x1="83.3%" y1="8" x2="83.3%" y2="20" class="dg-line" stroke-width="0.75"/>
  <!-- Zone letters -->
  <text x="8.3%" y="17" text-anchor="middle" class="dg-text" font-size="7">A</text>
  <text x="25%" y="17" text-anchor="middle" class="dg-text" font-size="7">B</text>
  <text x="41.6%" y="17" text-anchor="middle" class="dg-text" font-size="7">C</text>
  <text x="58.3%" y="17" text-anchor="middle" class="dg-text" font-size="7">D</text>
  <text x="75%" y="17" text-anchor="middle" class="dg-text" font-size="7">E</text>
  <text x="91.6%" y="17" text-anchor="middle" class="dg-text" font-size="7">F</text>

  <!-- Bottom zone ticks & letters (mirrored) -->
  <line x1="16.6%" y1="calc(100% - 8px)" x2="16.6%" y2="calc(100% - 20px)" class="dg-line" stroke-width="0.75"/>
  <line x1="33.3%" y1="calc(100% - 8px)" x2="33.3%" y2="calc(100% - 20px)" class="dg-line" stroke-width="0.75"/>
  <line x1="50%" y1="calc(100% - 8px)" x2="50%" y2="calc(100% - 20px)" class="dg-line" stroke-width="0.75"/>
  <line x1="66.6%" y1="calc(100% - 8px)" x2="66.6%" y2="calc(100% - 20px)" class="dg-line" stroke-width="0.75"/>
  <line x1="83.3%" y1="calc(100% - 8px)" x2="83.3%" y2="calc(100% - 20px)" class="dg-line" stroke-width="0.75"/>
  <text x="8.3%" y="calc(100% - 10px)" text-anchor="middle" class="dg-text" font-size="7">A</text>
  <text x="25%" y="calc(100% - 10px)" text-anchor="middle" class="dg-text" font-size="7">B</text>
  <text x="41.6%" y="calc(100% - 10px)" text-anchor="middle" class="dg-text" font-size="7">C</text>
  <text x="58.3%" y="calc(100% - 10px)" text-anchor="middle" class="dg-text" font-size="7">D</text>
  <text x="75%" y="calc(100% - 10px)" text-anchor="middle" class="dg-text" font-size="7">E</text>
  <text x="91.6%" y="calc(100% - 10px)" text-anchor="middle" class="dg-text" font-size="7">F</text>

  <!-- === ZONE MARKERS (left edge, numbers) === -->
  <line x1="8" y1="20%" x2="20" y2="20%" class="dg-line" stroke-width="0.75"/>
  <line x1="8" y1="40%" x2="20" y2="40%" class="dg-line" stroke-width="0.75"/>
  <line x1="8" y1="60%" x2="20" y2="60%" class="dg-line" stroke-width="0.75"/>
  <line x1="8" y1="80%" x2="20" y2="80%" class="dg-line" stroke-width="0.75"/>
  <text x="14" y="10%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">1</text>
  <text x="14" y="30%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">2</text>
  <text x="14" y="50%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">3</text>
  <text x="14" y="70%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">4</text>
  <text x="14" y="90%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">5</text>

  <!-- Right edge numbers (mirrored) -->
  <line x1="calc(100% - 8px)" y1="20%" x2="calc(100% - 20px)" y2="20%" class="dg-line" stroke-width="0.75"/>
  <line x1="calc(100% - 8px)" y1="40%" x2="calc(100% - 20px)" y2="40%" class="dg-line" stroke-width="0.75"/>
  <line x1="calc(100% - 8px)" y1="60%" x2="calc(100% - 20px)" y2="60%" class="dg-line" stroke-width="0.75"/>
  <line x1="calc(100% - 8px)" y1="80%" x2="calc(100% - 20px)" y2="80%" class="dg-line" stroke-width="0.75"/>
  <text x="calc(100% - 14px)" y="10%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">1</text>
  <text x="calc(100% - 14px)" y="30%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">2</text>
  <text x="calc(100% - 14px)" y="50%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">3</text>
  <text x="calc(100% - 14px)" y="70%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">4</text>
  <text x="calc(100% - 14px)" y="90%" dominant-baseline="central" text-anchor="middle" class="dg-text" font-size="7">5</text>

  <!-- === CENTERING / REGISTRATION MARKS (crosshairs at center of each edge) === -->
  <!-- Top center -->
  <line x1="50%" y1="2" x2="50%" y2="8" class="dg-line-medium"/>
  <line x1="calc(50% - 3px)" y1="5" x2="calc(50% + 3px)" y2="5" class="dg-line-medium"/>
  <!-- Bottom center -->
  <line x1="50%" y1="calc(100% - 2px)" x2="50%" y2="calc(100% - 8px)" class="dg-line-medium"/>
  <line x1="calc(50% - 3px)" y1="calc(100% - 5px)" x2="calc(50% + 3px)" y2="calc(100% - 5px)" class="dg-line-medium"/>
  <!-- Left center -->
  <line x1="2" y1="50%" x2="8" y2="50%" class="dg-line-medium"/>
  <line x1="5" y1="calc(50% - 3px)" x2="5" y2="calc(50% + 3px)" class="dg-line-medium"/>
  <!-- Right center -->
  <line x1="calc(100% - 2px)" y1="50%" x2="calc(100% - 8px)" y2="50%" class="dg-line-medium"/>
  <line x1="calc(100% - 5px)" y1="calc(50% - 3px)" x2="calc(100% - 5px)" y2="calc(50% + 3px)" class="dg-line-medium"/>

  <!-- === GHOST TECHNICAL CONTENT (as if bleeding through from another drawing) === -->

  <!-- Ghost dimension lines -->
  <g class="dg-ghost" stroke-width="0.5">
    <!-- Horizontal dimension -->
    <line x1="12%" y1="22%" x2="38%" y2="22%"/>
    <line x1="12%" y1="21%" x2="12%" y2="23%"/>
    <line x1="38%" y1="21%" x2="38%" y2="23%"/>
    <polygon points="0,0 -4,-1.5 -4,1.5" transform="translate(180, 220)" fill="rgba(80,90,100,0.035)"/>
    <text x="25%" y="21.5%" class="dg-text" font-size="6" fill="rgba(80,90,100,0.04)" text-anchor="middle">4.750</text>

    <!-- Vertical dimension -->
    <line x1="72%" y1="55%" x2="72%" y2="82%"/>
    <line x1="71%" y1="55%" x2="73%" y2="55%"/>
    <line x1="71%" y1="82%" x2="73%" y2="82%"/>
    <text x="73.5%" y="68%" class="dg-text" font-size="6" fill="rgba(80,90,100,0.04)" transform="rotate(90, 73.5%, 68%)">12.375</text>

    <!-- Another horizontal dimension -->
    <line x1="55%" y1="88%" x2="82%" y2="88%"/>
    <line x1="55%" y1="87%" x2="55%" y2="89%"/>
    <line x1="82%" y1="87%" x2="82%" y2="89%"/>
    <text x="68.5%" y="87.5%" class="dg-text" font-size="6" fill="rgba(80,90,100,0.04)" text-anchor="middle">8.125</text>

    <!-- Short dimension -->
    <line x1="15%" y1="62%" x2="28%" y2="62%"/>
    <line x1="15%" y1="61%" x2="15%" y2="63%"/>
    <line x1="28%" y1="61%" x2="28%" y2="63%"/>
    <text x="21.5%" y="61.5%" class="dg-text" font-size="5" fill="rgba(80,90,100,0.035)" text-anchor="middle">2.000</text>
  </g>

  <!-- Ghost circles (bolt holes / features) -->
  <g class="dg-ghost" stroke-width="0.5">
    <circle cx="82%" cy="28%" r="8"/>
    <line x1="82%" y1="calc(28% - 10px)" x2="82%" y2="calc(28% + 10px)"/>
    <line x1="calc(82% - 10px)" y1="28%" x2="calc(82% + 10px)" y2="28%"/>
    <!-- Leader line to callout -->
    <line x1="calc(82% + 8px)" y1="calc(28% - 5px)" x2="calc(82% + 35px)" y2="calc(28% - 22px)"/>
    <line x1="calc(82% + 35px)" y1="calc(28% - 22px)" x2="calc(82% + 60px)" y2="calc(28% - 22px)"/>
    <text x="calc(82% + 38px)" y="calc(28% - 25px)" class="dg-text" font-size="5" fill="rgba(80,90,100,0.04)">Ø.250 THRU</text>

    <!-- Second bolt hole -->
    <circle cx="18%" cy="42%" r="6"/>
    <line x1="18%" y1="calc(42% - 8px)" x2="18%" y2="calc(42% + 8px)"/>
    <line x1="calc(18% - 8px)" y1="42%" x2="calc(18% + 8px)" y2="42%"/>

    <!-- Bolt circle pattern (ghost) -->
    <circle cx="60%" cy="35%" r="25" stroke-dasharray="4,3"/>
    <circle cx="calc(60% + 25px)" cy="35%" r="3"/>
    <circle cx="calc(60% - 25px)" cy="35%" r="3"/>
    <circle cx="60%" cy="calc(35% + 25px)" r="3"/>
    <circle cx="60%" cy="calc(35% - 25px)" r="3"/>
  </g>

  <!-- Ghost section cut line -->
  <g class="dg-ghost" stroke-width="0.75">
    <line x1="30%" y1="44%" x2="50%" y2="44%" stroke-dasharray="12,3,2,3"/>
    <line x1="30%" y1="43%" x2="30%" y2="45.5%"/>
    <line x1="50%" y1="43%" x2="50%" y2="45.5%"/>
    <text x="29%" y="46.5%" class="dg-text" font-size="7" fill="rgba(80,90,100,0.045)">A</text>
    <text x="51%" y="46.5%" class="dg-text" font-size="7" fill="rgba(80,90,100,0.045)">A</text>
  </g>

  <!-- Ghost surface finish symbol -->
  <g class="dg-ghost" stroke-width="0.5" transform="translate(150, 520)">
    <polyline points="0,12 6,0 12,12"/>
    <line x1="12" y1="12" x2="20" y2="12"/>
    <text x="22" y="14" class="dg-text" font-size="5" fill="rgba(80,90,100,0.035)">63</text>
  </g>

  <!-- Ghost GD&T feature control frame -->
  <g class="dg-ghost" stroke-width="0.5" transform="translate(850, 380)">
    <rect x="0" y="0" width="65" height="12"/>
    <line x1="13" y1="0" x2="13" y2="12"/>
    <line x1="33" y1="0" x2="33" y2="12"/>
    <line x1="48" y1="0" x2="48" y2="12"/>
    <circle cx="6" cy="6" r="4"/>
    <text x="23" y="9" class="dg-text" font-size="5" fill="rgba(80,90,100,0.035)" text-anchor="middle">.005</text>
    <text x="40" y="9" class="dg-text" font-size="5" fill="rgba(80,90,100,0.035)" text-anchor="middle">A</text>
    <text x="56" y="9" class="dg-text" font-size="5" fill="rgba(80,90,100,0.035)" text-anchor="middle">B</text>
  </g>

  <!-- Ghost welding symbol -->
  <g class="dg-ghost" stroke-width="0.5" transform="translate(400, 680)">
    <line x1="0" y1="0" x2="20" y2="-15"/>
    <line x1="20" y1="-15" x2="50" y2="-15"/>
    <polygon points="20,-15 28,-20 28,-10" fill="rgba(80,90,100,0.025)"/>
  </g>

  <!-- Ghost revision triangle -->
  <g transform="translate(92%, 15%)">
    <polygon points="0,-8 7,4 -7,4" class="dg-ghost" stroke-width="0.75"/>
    <text x="0" y="2" class="dg-text" font-size="6" fill="rgba(80,90,100,0.045)" text-anchor="middle">C</text>
  </g>

  <!-- Ghost parts list / BOM table (upper right area) -->
  <g class="dg-ghost" stroke-width="0.5" transform="translate(75%, 8%)">
    <rect x="0" y="0" width="140" height="60"/>
    <line x1="0" y1="12" x2="140" y2="12"/>
    <line x1="0" y1="24" x2="140" y2="24"/>
    <line x1="0" y1="36" x2="140" y2="36"/>
    <line x1="0" y1="48" x2="140" y2="48"/>
    <line x1="25" y1="0" x2="25" y2="60"/>
    <line x1="70" y1="0" x2="70" y2="60"/>
    <line x1="105" y1="0" x2="105" y2="60"/>
    <text x="12" y="9" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)" text-anchor="middle">ITEM</text>
    <text x="47" y="9" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)" text-anchor="middle">PART NO.</text>
    <text x="87" y="9" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)" text-anchor="middle">DESCRIPTION</text>
    <text x="122" y="9" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)" text-anchor="middle">QTY</text>
  </g>

  <!-- Ghost title block (lower right) -->
  <g class="dg-ghost" stroke-width="0.75" transform="translate(65%, 88%)">
    <rect x="0" y="0" width="220" height="70"/>
    <!-- Horizontal dividers -->
    <line x1="0" y1="18" x2="220" y2="18"/>
    <line x1="0" y1="36" x2="220" y2="36"/>
    <line x1="0" y1="52" x2="220" y2="52"/>
    <!-- Vertical dividers -->
    <line x1="65" y1="0" x2="65" y2="52"/>
    <line x1="145" y1="0" x2="145" y2="52"/>
    <!-- Labels -->
    <text x="3" y="10" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)">DRAWN</text>
    <text x="3" y="28" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)">CHECKED</text>
    <text x="3" y="46" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)">APPROVED</text>
    <text x="68" y="10" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)">DATE</text>
    <text x="148" y="10" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)">SCALE</text>
    <!-- Title area -->
    <text x="110" y="64" class="dg-text" font-size="5" fill="rgba(80,90,100,0.04)" text-anchor="middle">DWG NO.</text>
  </g>

  <!-- Ghost tolerance block (near title block) -->
  <g class="dg-ghost" stroke-width="0.5" transform="translate(65%, 82%)">
    <rect x="0" y="0" width="220" height="30"/>
    <text x="5" y="10" class="dg-text" font-size="4" fill="rgba(80,90,100,0.035)">UNLESS OTHERWISE SPECIFIED</text>
    <text x="5" y="18" class="dg-text" font-size="3.5" fill="rgba(80,90,100,0.03)">DIMENSIONS ARE IN INCHES</text>
    <text x="5" y="25" class="dg-text" font-size="3.5" fill="rgba(80,90,100,0.03)">TOLERANCES: .XX ±.01  .XXX ±.005</text>
    <text x="130" y="18" class="dg-text" font-size="3.5" fill="rgba(80,90,100,0.03)">MATERIAL: SEE NOTE 1</text>
    <text x="130" y="25" class="dg-text" font-size="3.5" fill="rgba(80,90,100,0.03)">FINISH: SEE NOTE 2</text>
  </g>

  <!-- Ghost revision block (upper right) -->
  <g class="dg-ghost" stroke-width="0.5" transform="translate(82%, 3%)">
    <rect x="0" y="0" width="100" height="40"/>
    <line x1="0" y1="10" x2="100" y2="10"/>
    <line x1="0" y1="20" x2="100" y2="20"/>
    <line x1="0" y1="30" x2="100" y2="30"/>
    <line x1="15" y1="0" x2="15" y2="40"/>
    <line x1="65" y1="0" x2="65" y2="40"/>
    <text x="7" y="8" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)" text-anchor="middle">REV</text>
    <text x="40" y="8" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)" text-anchor="middle">DESCRIPTION</text>
    <text x="82" y="8" class="dg-text" font-size="4" fill="rgba(80,90,100,0.04)" text-anchor="middle">DATE</text>
    <text x="7" y="18" class="dg-text" font-size="4" fill="rgba(80,90,100,0.035)" text-anchor="middle">A</text>
    <text x="7" y="28" class="dg-text" font-size="4" fill="rgba(80,90,100,0.035)" text-anchor="middle">B</text>
  </g>

  <!-- Ghost note block -->
  <g class="dg-ghost" stroke-width="0.3" transform="translate(5%, 85%)">
    <text x="0" y="0" class="dg-text" font-size="5" fill="rgba(80,90,100,0.04)">NOTES:</text>
    <text x="0" y="10" class="dg-text" font-size="4" fill="rgba(80,90,100,0.03)">1. MATERIAL PER SPEC XYZ-1234</text>
    <text x="0" y="18" class="dg-text" font-size="4" fill="rgba(80,90,100,0.03)">2. DEBURR ALL SHARP EDGES .005-.015</text>
    <text x="0" y="26" class="dg-text" font-size="4" fill="rgba(80,90,100,0.03)">3. SURFACE FINISH 63 UNLESS NOTED</text>
  </g>

  <!-- Ghost centerlines -->
  <g class="dg-ghost" stroke-width="0.4">
    <line x1="40%" y1="25%" x2="40%" y2="38%" stroke-dasharray="12,3,2,3"/>
    <line x1="33%" y1="31%" x2="47%" y2="31%" stroke-dasharray="12,3,2,3"/>
  </g>

  <!-- Ghost hidden lines (dashed, representing hidden features) -->
  <g class="dg-ghost" stroke-width="0.4">
    <line x1="20%" y1="72%" x2="35%" y2="72%" stroke-dasharray="5,3"/>
    <line x1="20%" y1="76%" x2="35%" y2="76%" stroke-dasharray="5,3"/>
  </g>
</svg>
