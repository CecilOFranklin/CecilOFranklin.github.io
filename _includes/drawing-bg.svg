<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" class="drawing-svg">
  <defs>
    <!-- Fine grid pattern -->
    <pattern id="smallGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(100,120,140,0.06)" stroke-width="0.5"/>
    </pattern>
    <!-- Major grid pattern -->
    <pattern id="grid" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="url(#smallGrid)"/>
      <path d="M 120 0 L 0 0 0 120" fill="none" stroke="rgba(100,120,140,0.1)" stroke-width="0.5"/>
    </pattern>
    <!-- Zone tick marks -->
    <pattern id="zoneTicks" width="120" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="rgba(100,120,140,0.12)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Grid fill -->
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Outer border -->
  <rect x="12" y="12" width="calc(100% - 24px)" height="calc(100% - 24px)" fill="none" stroke="rgba(100,120,140,0.12)" stroke-width="2"/>
  <!-- Inner border -->
  <rect x="18" y="18" width="calc(100% - 36px)" height="calc(100% - 36px)" fill="none" stroke="rgba(100,120,140,0.08)" stroke-width="0.5"/>

  <!-- Zone markers along top -->
  <text x="25%" y="11" text-anchor="middle" fill="rgba(100,120,140,0.1)" font-size="8" font-family="Courier Prime, monospace">A</text>
  <text x="50%" y="11" text-anchor="middle" fill="rgba(100,120,140,0.1)" font-size="8" font-family="Courier Prime, monospace">B</text>
  <text x="75%" y="11" text-anchor="middle" fill="rgba(100,120,140,0.1)" font-size="8" font-family="Courier Prime, monospace">C</text>

  <!-- Zone markers along left -->
  <text x="9" y="25%" text-anchor="middle" fill="rgba(100,120,140,0.1)" font-size="8" font-family="Courier Prime, monospace" transform="rotate(-90, 9, 25%)">1</text>
  <text x="9" y="50%" text-anchor="middle" fill="rgba(100,120,140,0.1)" font-size="8" font-family="Courier Prime, monospace" transform="rotate(-90, 9, 50%)">2</text>
  <text x="9" y="75%" text-anchor="middle" fill="rgba(100,120,140,0.1)" font-size="8" font-family="Courier Prime, monospace" transform="rotate(-90, 9, 75%)">3</text>

  <!-- Fold marks (center cross-hairs) -->
  <line x1="50%" y1="12" x2="50%" y2="20" stroke="rgba(100,120,140,0.1)" stroke-width="0.5"/>
  <line x1="12" y1="50%" x2="20" y2="50%" stroke="rgba(100,120,140,0.1)" stroke-width="0.5"/>
  <line x1="50%" y1="calc(100% - 12px)" x2="50%" y2="calc(100% - 20px)" stroke="rgba(100,120,140,0.1)" stroke-width="0.5"/>
  <line x1="calc(100% - 12px)" y1="50%" x2="calc(100% - 20px)" y2="50%" stroke="rgba(100,120,140,0.1)" stroke-width="0.5"/>

  <!-- Ghost title block (bottom right) - faint as if bleeding through -->
  <g transform="translate(-280, -90)" opacity="0.04">
    <rect x="100%" y="100%" width="260" height="75" fill="none" stroke="rgb(60,80,100)" stroke-width="2"/>
    <!-- Inner divisions -->
    <line x1="100%" y1="calc(100% + 25px)" x2="calc(100% + 260px)" y2="calc(100% + 25px)" stroke="rgb(60,80,100)" stroke-width="1"/>
    <line x1="100%" y1="calc(100% + 50px)" x2="calc(100% + 260px)" y2="calc(100% + 50px)" stroke="rgb(60,80,100)" stroke-width="1"/>
    <line x1="calc(100% + 130px)" y1="100%" x2="calc(100% + 130px)" y2="calc(100% + 75px)" stroke="rgb(60,80,100)" stroke-width="1"/>
  </g>

  <!-- Scattered dimension-like ghost lines -->
  <g opacity="0.03" stroke="rgb(60,80,100)" stroke-width="0.5">
    <line x1="15%" y1="20%" x2="35%" y2="20%"/>
    <line x1="15%" y1="19.5%" x2="15%" y2="20.5%"/>
    <line x1="35%" y1="19.5%" x2="35%" y2="20.5%"/>

    <line x1="70%" y1="65%" x2="70%" y2="85%"/>
    <line x1="69.5%" y1="65%" x2="70.5%" y2="65%"/>
    <line x1="69.5%" y1="85%" x2="70.5%" y2="85%"/>

    <!-- Circle (as if a bolt hole callout) -->
    <circle cx="80%" cy="30%" r="12" fill="none"/>
    <line x1="calc(80% + 12px)" y1="30%" x2="calc(80% + 40px)" y2="calc(30% - 20px)"/>

    <!-- Another dimension -->
    <line x1="25%" y1="75%" x2="55%" y2="75%"/>
    <line x1="25%" y1="74.5%" x2="25%" y2="75.5%"/>
    <line x1="55%" y1="74.5%" x2="55%" y2="75.5%"/>
  </g>

  <!-- Ghost section view indicator -->
  <g opacity="0.025" stroke="rgb(60,80,100)" fill="rgb(60,80,100)">
    <line x1="40%" y1="40%" x2="60%" y2="40%" stroke-width="0.75" stroke-dasharray="8,3,2,3"/>
    <text x="39%" y="calc(40% + 4px)" font-size="7" font-family="Courier Prime, monospace">A</text>
    <text x="61%" y="calc(40% + 4px)" font-size="7" font-family="Courier Prime, monospace">A</text>
  </g>
</svg>
